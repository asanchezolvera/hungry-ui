<button
  [id]="buttonId()"
  [attr.type]="iconOnly() ? 'button' : null"
  [disabled]="disabled() || loading()"
  (click)="handleClick($event)"
  (focus)="handleFocus($event)"
  (blur)="handleBlur($event)"
>
  @if (loading()) {
    <span class="hungry-button__loader" aria-hidden="true">
      <svg
        class="animate-spin"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </span>
  }

  @if (icon() && iconPosition() === 'left' && !loading()) {
    <span
      class="hungry-button__icon hungry-button__icon--left"
      aria-hidden="true"
    >
      <ng-container [ngTemplateOutlet]="icon()!"></ng-container>
    </span>
  }

  @if (!iconOnly()) {
    <span class="hungry-button__content">
      <ng-content></ng-content>
    </span>
  }

  @if (icon() && iconPosition() === 'right' && !loading()) {
    <span
      class="hungry-button__icon hungry-button__icon--right"
      aria-hidden="true"
    >
      <ng-container [ngTemplateOutlet]="icon()!"></ng-container>
    </span>
  }

  @if (icon() && iconPosition() === 'only' && !loading()) {
    <span
      class="hungry-button__icon hungry-button__icon--only"
      aria-hidden="true"
    >
      <ng-container [ngTemplateOutlet]="icon()!"></ng-container>
    </span>
  }
</button>
